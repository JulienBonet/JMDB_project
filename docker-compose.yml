# docker-compose.yml
services:
  jmdb-mysql:
    image: mysql:8.0
    container_name: jmdb-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jmdb
      MYSQL_USER: jmdb_user
      MYSQL_PASSWORD: Lccabqls30!2026
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - jmdb_mysql_data:/var/lib/mysql
    networks:
      - jmtb_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  jmdb-backend:
    build: ./backend
    container_name: jmdb-backend
    restart: unless-stopped
    ports:
      - "3310:3310"
    environment:
      NODE_ENV: production
    env_file:
      - ./backend/.env.production
    depends_on:
      jmdb-mysql:
        condition: service_healthy
    networks:
      - jmtb_network

  jmdb-frontend:
    build: ./frontend
    container_name: jmdb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - jmdb-backend
    networks:
      - jmtb_network

volumes:
  jmdb_mysql_data:

networks:
  jmtb_network:
    driver: bridge